# ===========================
# DATABASE (PostgreSQL / Supabase)
# ===========================
# ค่าจริงมาจาก Environment Variable ที่ตั้งใน Render dashboard
# ห้าม hardcode username/password ในไฟล์นี้เด็ดขาด (ไฟล์นี้ถูก commit ขึ้น git)
# ค่าหลัง : คือ default ตอนรันบนเครื่องตัวเอง (ถ้าไม่ได้ set env var จะใช้ค่านี้แทน)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/arinternship}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / HIBERNATE
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===========================
# SERVER
# ===========================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=true

# ===========================
# ENCODING
# ===========================
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# ===========================
# FILE UPLOAD
# ===========================
file.upload-dir=uploads/
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===========================
# LOGGING
# ===========================
logging.level.org.hibernate=ERROR

# ===========================
# SESSION COOKIE
# ===========================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.path=/
# ✅ lax ใช้กับ http://localhost ได้ (none ต้องการ https)
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true